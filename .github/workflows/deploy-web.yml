name: Deploy Website

on:
  push:
    branches: [ "main" ]
    paths: [ "web/**" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Website
        working-directory: web
        run: |
          npm install
          npm run build

      # gh-pages deployment is intentionally disabled.
      # The repository now treats main as the only active development line,
      # and desktop/release distribution no longer depends on GitHub Pages.
